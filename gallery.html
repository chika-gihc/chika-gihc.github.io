<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery | Chika</title>

<!-- アイコン -->
<link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
<link rel="icon" type="image/png" sizes="64x64" href="/favicon@2x.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;700&family=M+PLUS+Rounded+1c:wght@400;500;700&display=swap" rel="stylesheet">

<style>
:root{
 --main:#89B4B0;
 --sub:#E8CFCF;
 --text:#6B7C7A;
}

body{
 margin:0;
 font-family:'Quicksand',sans-serif;
 color:var(--text);
 background:
 radial-gradient(circle, rgba(137,180,176,0.15) 1px, transparent 1px);
 background-size:40px 40px;
 animation: moveDots 120s linear infinite;
 -webkit-touch-callout:none;
}

@keyframes moveDots{
 from{ background-position:0 0; }
 to{ background-position:400px 400px; }
}

img{
 -webkit-user-drag:none;
 user-drag:none;
 user-select:none;
 -webkit-user-select:none;
}

/* NAV */
nav{
 position:fixed;
 top:0;
 width:100%;
 display:flex;
 justify-content:center;
 gap:35px;
 padding:18px 0;
 backdrop-filter:blur(12px);
 background:rgba(255,255,255,0.9);
 z-index:1000;
}

nav a{
 text-decoration:none;
 color:var(--text);
 transition:.3s;
}
nav a:hover{color:var(--sub);}

/* SECTION */
section{
 padding:140px 20px 80px;
 max-width:1100px;
 margin:auto;
 text-align:center;
}

.section-title{
 font-size:28px;
 margin-bottom:40px;
 color:var(--main);
 cursor:default;
}

/* ===== サムネイル中央配置 ===== */
.gallery-grid{
 display:grid;
 grid-template-columns:repeat(3,auto);
 justify-content:center;
 gap:20px;
 margin:0 auto 30px auto;
}

.gallery-item{
 width:120px;
 height:120px;
 border-radius:50%;
 overflow:hidden;
 cursor:pointer;
 position:relative;
 transition:0.3s ease;
}

.gallery-item img{
 width:100%;
 height:100%;
 object-fit:contain;
 display:block;
 transition:0.3s ease;
}

.gallery-item::after{
 content:"";
 position:absolute;
 inset:0;
 background:white;
 opacity:0;
 transition:0.3s ease;
 pointer-events:none;
 border-radius:50%;
}

.gallery-item:hover::after{
 opacity:0.3;
}

.live2d .gallery-item{
 border:3px solid var(--main);
}

.live2d .gallery-item:hover{
 border-color:var(--sub);
}

.gallery-section{
 margin-bottom:60px;
}

@media(max-width:768px){
 .gallery-grid{ gap:15px; }
}

@media(max-width:480px){
 .gallery-grid{ gap:10px; }
}

/* MODAL */
.modal{
 position:fixed;
 inset:0;
 background:rgba(255,255,255,0.7);
 display:flex;
 align-items:center;
 justify-content:center;
 padding-top:120px;
 padding-bottom:120px;
 opacity:0;
 visibility:hidden;
 transition:.3s;
 z-index:2000;
}

.modal.active{
 opacity:1;
 visibility:visible;
}

.modal-content{
 position:relative;
 max-width:90vw;
 max-height:75vh;
}

.modal-content img{
 width:100%;
 max-height:75vh;
 object-fit:contain;
 border-radius:30px;
 box-shadow:0 20px 40px rgba(0,0,0,0.25);
}

.close-btn{
 position:absolute;
 right:0;
 bottom:-55px;
 background:white;
 padding:8px 28px;
 border-radius:40px;
 cursor:pointer;
 box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

/* FOOTER */
footer{
 text-align:center;
 padding:80px 0;
 font-size:14px;
 opacity:.8;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
 <a href="index.html">Top</a>
 <a href="index.html">About</a>
 <a href="index.html">Links</a>
 <a href="gallery.html">Gallery</a>
 <a href="index.html">Contact</a>
</nav>

<section>

<div class="section-title">✦ Illustrations ✦</div>

<div class="gallery-section">
<div class="gallery-grid">
 <div class="gallery-item"><img src="thumbnail1.png" data-popup="illust1.png"></div>
 <div class="gallery-item"><img src="thumbnail2.png" data-popup="illust2.png"></div>
 <div class="gallery-item"><img src="thumbnail3.png" data-popup="illust3.png"></div>
</div>

<div class="gallery-grid">
 <div class="gallery-item"><img src="thumbnail4.png" data-popup="illust4.png"></div>
 <div class="gallery-item"><img src="thumbnail5.png" data-popup="illust5.png"></div>
 <div class="gallery-item"><img src="thumbnail6.png" data-popup="illust6.png"></div>
</div>

<div class="gallery-grid">
 <div class="gallery-item"><img src="thumbnail7.png" data-popup="illust7.png"></div>
 <div class="gallery-item"><img src="thumbnail8.png" data-popup="illust8.png"></div>
 <div class="gallery-item"><img src="thumbnail9.png" data-popup="illust9.png"></div>
</div>
</div>

<div class="section-title">✦ VTuber Model Illustrations ✦</div>

<div class="gallery-section live2d">
<div class="gallery-grid">
 <div class="gallery-item"><img src="thumbnail1a.png" data-popup="illust1a.png"></div>
 <div class="gallery-item"><img src="thumbnail2a.png" data-popup="illust2a.png"></div>
 <div class="gallery-item"><img src="thumbnail3a.png" data-popup="illust3a.png"></div>
</div>

<div class="gallery-grid">
 <div class="gallery-item"><img src="thumbnail4a.png" data-popup="illust4a.png"></div>
 <div class="gallery-item"><img src="thumbnail5a.png" data-popup="illust5a.png"></div>
</div>
</div>

</section>

<div class="modal" id="modal">
 <div class="modal-content">
  <img id="modalImage" src="">
  <div class="close-btn" id="closeBtn">× Close</div>
 </div>
</div>

<footer>
© 2026 Chika All Rights Reserved.
</footer>

<script>
document.addEventListener("contextmenu",e=>e.preventDefault());
document.addEventListener("dragstart",e=>e.preventDefault());
document.addEventListener("selectstart",e=>e.preventDefault());

const modal=document.getElementById("modal");
const modalImage=document.getElementById("modalImage");
const closeBtn=document.getElementById("closeBtn");

document.querySelectorAll(".gallery-item").forEach(item=>{
 item.addEventListener("click",()=>{
   const img=item.querySelector("img");
   const popup=img.getAttribute("data-popup");
   modalImage.src=popup;
   modal.classList.add("active");
 });
});

closeBtn.addEventListener("click",()=>modal.classList.remove("active"));

modal.addEventListener("click",e=>{
 if(e.target===modal){
  modal.classList.remove("active");
 }
});

document.addEventListener("keydown", function(e){
 if(e.key === "F12"){ e.preventDefault(); }
 if(e.ctrlKey && e.shiftKey && (e.key === "I" || e.key === "J")){ e.preventDefault(); }
 if(e.ctrlKey && e.key === "u"){ e.preventDefault(); }
});

setInterval(function(){
 const threshold = 160;
 if(
   window.outerWidth - window.innerWidth > threshold ||
   window.outerHeight - window.innerHeight > threshold
 ){
   document.body.innerHTML = "";
 }
}, 1000);

</script>

</body>
</html>
